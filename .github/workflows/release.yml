name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete existing release (draft or published) for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" &>/dev/null; then
            gh release delete "$TAG" --yes
            echo "✓ Deleted old release (draft or published) for $TAG"
          else
            echo "No existing release for $TAG"
          fi

  build-desktop:
    needs: cleanup
    name: build-desktop (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
            target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin --bundles app
          - platform: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tauri_args: '--bundles deb,rpm,appimage'
          - platform: Windows
            os: windows-2022
            target: x86_64-pc-windows-msvc
            tauri_args: ''

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'macOS' && matrix.target || '' }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: desktop-rust-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: desktop-rust-${{ matrix.target }}-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          echo "::notice::Starting apt-get update at $(date +%H:%M:%S)"
          date +%s > /tmp/apt_start.txt
          sudo apt-get update
          echo "::notice::apt-get update done at $(date +%H:%M:%S)"
          date +%s > /tmp/apt_install_start.txt
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 cmake clang libclang-dev
          echo "::notice::apt-get install done at $(date +%H:%M:%S)"
          echo "Install duration: $(($(date +%s) - $(cat /tmp/apt_start.txt)))s total, $(($(date +%s) - $(cat /tmp/apt_install_start.txt)))s install-only"

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: |
          brew install cmake || brew upgrade cmake || true
          cmake --version
          clang --version

      - name: Install Windows build tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y cmake --version=3.31.6 --installargs 'ADD_CMAKE_TO_PATH=System' --force
          choco install -y llvm
          echo "C:\Program Files\CMake\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CMAKE_GENERATOR=Visual Studio 17 2022" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CMAKE_GENERATOR_PLATFORM=x64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CMAKE_DISABLE_FIND_PACKAGE_Fortran=TRUE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "EIGEN_BUILD_BLAS=OFF" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "EIGEN_BUILD_LAPACK=OFF" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "RUSTFLAGS=-C link-arg=advapi32.lib -C link-arg=ole32.lib -C link-arg=user32.lib -C link-arg=shell32.lib -C link-arg=tdh.lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          cmake --version

      - name: Hide mingw/strawberry from build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($dir in @('C:\mingw64', 'C:\Strawberry', 'C:\msys64')) {
            if (Test-Path $dir) {
              $disabled = "$dir.disabled"
              if (Test-Path $disabled) { Remove-Item -Recurse -Force $disabled }
              Rename-Item -Path $dir -NewName "$(Split-Path $dir -Leaf).disabled" -ErrorAction SilentlyContinue
              Write-Host "Renamed $dir"
            }
          }
          Get-Command gfortran -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "WARN: gfortran still at $($_.Source)" }

      - name: Check Rust versions
        run: |
          rustc --version
          cargo --version
          echo "::notice::Rust setup done at $(date +%H:%M:%S)"

      - run: npm ci

      - name: Inject cloud.js from secret
        shell: bash
        env:
          CLOUD_JS_BASE64: ${{ secrets.CLOUD_JS_BASE64 }}
        run: |
          if [ -n "$CLOUD_JS_BASE64" ]; then
            node -e "require('fs').writeFileSync('js/cloud.js', Buffer.from(process.env.CLOUD_JS_BASE64, 'base64'))"
            echo "✓ cloud.js injected"
          else
            echo "! CLOUD_JS_BASE64 not set — using stub"
          fi

      - run: npm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'A4 Memory ${{ github.ref_name }}'
          releaseBody: |
            ## A4 Memory

            A4 纸随机排版背单词，打破列表式背书模式。

            ### 本次更新
            - 新增：内置离线 TTS（Sherpa-ONNX / VITS-piper / MMS-TTS），桌面端在设置 → 离线语音包按需下载，模型缓存于 `app_data_dir()/voices/<id>/`，CSP `connect-src` 已放行 `https://tts.k7tmiz.com`
            - 修复：sherpa-rs 改为 `static` 特性本地编译 sherpa-onnx C++（CI 安装 cmake/clang/llvm），不再依赖不稳定的预编译二进制下载
            - 修复：Linux AppImage 打包恢复，CI 安装 `libfuse2`，`tauri_args` 改为 `--bundles deb,rpm,appimage`
            - 修复：恢复 `index.html` / `records.html` 视口元标签 `maximum-scale=1, user-scalable=no`，禁用双指捏合缩放
            - 优化：Edge TTS 启动延迟，Sec-MS-GEC token 5 分钟缓存，连接超时 5000ms→3000ms，首音超时 3500ms→2500ms
            - 保留：在线 TTS 优先浏览器直连 Microsoft Edge / Google 翻译，失败依次回退同源私有桥接、另一在线源、系统语音
            - 保留：Android 发音仅系统 TextToSpeech 桥接 `a4_android_speak(text, lang)`；Android 端暂不内置离线 TTS

            ### 功能
            - A4 随机排版、复习轮次、发音朗读、离线使用
            - 内置 CET4 / CET6 / 西班牙语词书，支持自定义导入
            - 云同步（登录后可在桌面端 / Android / Web 同步学习进度）
            - AI 词书生成

            ### 下载
            | 平台 | 文件 |
            |------|------|
            | macOS (Apple Silicon) | `A4 Memory_*_aarch64.dmg` |
            | Windows (x64) | `A4 Memory_*_x64.exe` |
            | Linux | `A4 Memory_*_amd64.deb` / `.AppImage` |
            | Android | `a4-memory-v*-android.apk` |

            ### 安装
            - **macOS**: 打开 `.dmg` → 拖入 Applications → 终端运行 `xattr -cr /Applications/A4\ Memory.app` 移除隔离标记
            - **Windows**: 双击 `.exe` → 按向导安装
            - **Linux**: `sudo dpkg -i *.deb` 或直接运行 `.AppImage`
            - **Android**: 允许来源不明应用 → 点击 `.apk` 安装

            ### 说明
            - 此版本为 GitHub Actions 自动构建，**含云同步功能**
            - 网页版请访问 **[k7tmiz.com/words](https://k7tmiz.com/words)**
            - `cloud.js` 为私有模块，如需使用请联系作者
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri_args }}

      - name: Create macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          APP_PATH=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "No macOS .app bundle found"
            exit 1
          fi

          DMG_ROOT=$(mktemp -d)
          cp -R "$APP_PATH" "$DMG_ROOT/"
          ln -s /Applications "$DMG_ROOT/Applications"

          DMG_NAME="A4 Memory_${VERSION}_aarch64.dmg"
          hdiutil create \
            -volname "A4 Memory" \
            -srcfolder "$DMG_ROOT" \
            -ov \
            -format UDZO \
            "$DMG_NAME"

          gh release upload "${{ github.ref_name }}" "$DMG_NAME" --clobber
          echo "✓ DMG uploaded: $DMG_NAME"

  build-android:
    needs: build-desktop
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          NDK_VER=$(ls $ANDROID_HOME/ndk 2>/dev/null | head -1)
          if [ -n "$NDK_VER" ] && [ -d "$ANDROID_HOME/ndk/$NDK_VER/toolchains/llvm/prebuilt" ]; then
            echo "✓ NDK $NDK_VER already present"
          else
            echo "Installing NDK..."
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;default" 2>&1 | tail -5
          fi
          NDK_VER=$(ls $ANDROID_HOME/ndk | head -1)
          echo "NDK_ROOT=$ANDROID_HOME/ndk/$NDK_VER"
          echo "NDK_ROOT=$ANDROID_HOME/ndk/$NDK_VER" >> "$GITHUB_ENV"

      - name: Set NDK clang as linker for Android target
        run: |
          NDK_VER=$(ls $ANDROID_HOME/ndk | head -1)
          echo "NDK_VER=$NDK_VER"
          NDK_TOOLCHAIN="$ANDROID_HOME/ndk/$NDK_VER/toolchains/llvm/prebuilt"
          echo "NDK_TOOLCHAIN=$NDK_TOOLCHAIN"
          echo "=== Available NDK binaries ==="
          find "$NDK_TOOLCHAIN" -name "*aarch64*" -type f 2>/dev/null | head -10
          # Find clang for aarch64 target (API level 21)
          NDK_CLANG=$(find "$NDK_TOOLCHAIN" -name "aarch64-linux-android21-clang*" -type f 2>/dev/null | grep -v ++ | head -1)
          if [ -z "$NDK_CLANG" ]; then
            echo "::error::aarch64-linux-android21-clang not found"
            find "$NDK_TOOLCHAIN" -name "aarch64*" -type f 2>/dev/null | head -10
            exit 1
          fi
          echo "Found NDK clang: $NDK_CLANG"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_CLANG}" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=${NDK_CLANG}" >> "$GITHUB_ENV"
          echo "CXX_aarch64_linux_android=${NDK_CLANG}++" >> "$GITHUB_ENV"
          echo "✓ NDK linker configured"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: android-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: android-rust-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle
            src-tauri/gen/android/.gradle
          key: android-gradle-${{ hashFiles('src-tauri/Cargo.lock', '.github/workflows/release.yml') }}
          restore-keys: android-gradle-

      - run: npm ci

      - name: Inject cloud.js from secret
        shell: bash
        env:
          CLOUD_JS_BASE64: ${{ secrets.CLOUD_JS_BASE64 }}
        run: |
          if [ -n "$CLOUD_JS_BASE64" ]; then
            node -e "require('fs').writeFileSync('js/cloud.js', Buffer.from(process.env.CLOUD_JS_BASE64, 'base64'))"
            echo "✓ cloud.js injected"
          else
            echo "! CLOUD_JS_BASE64 not set — using stub"
          fi

      - run: npm run build

      - name: Init Android project
        run: |
          rm -rf src-tauri/gen/android
          CI=true npx tauri android init --ci 2>&1 | tee /tmp/android-init.log
          echo "Init exit: $?"

      - name: Inject Android dependencies
        run: |
          GRADLE_FILE="src-tauri/gen/android/app/build.gradle.kts"
          if [ -f "$GRADLE_FILE" ]; then
          python3 - "$GRADLE_FILE" << 'PYEOF'
          import re, sys

          gradle_file = sys.argv[1]
          with open(gradle_file, 'r', encoding='utf-8') as f:
              content = f.read()

          dependencies = [
              'androidx.lifecycle:lifecycle-process:2.10.0',
          ]
          missing = [dep for dep in dependencies if dep not in content]

          if missing:
              deps_match = re.search(r'(dependencies\s*\{)(.*?)(\n\})', content, re.DOTALL)
              if deps_match:
                  insertion = ''.join(f'\n    implementation("{dep}")' for dep in missing)
                  content = (
                      content[:deps_match.start(3)]
                      + insertion
                      + content[deps_match.start(3):]
                  )
                  with open(gradle_file, 'w', encoding='utf-8') as f:
                      f.write(content)
                  print('Injected Android dependencies: ' + ', '.join(missing))
              else:
                  print('WARNING: dependencies block not found')
          else:
              print('Android dependencies already present')
          PYEOF
          else
            echo "WARNING: $GRADLE_FILE not found"
          fi

      - name: Install Android native bridge
        run: |
          mkdir -p src-tauri/gen/android/app/src/main/java/app/tauri
          cp src-tauri/android/A4SpeechBridge.kt src-tauri/gen/android/app/src/main/java/app/tauri/A4SpeechBridge.kt
          echo "✓ Android native bridge installed"
          echo "=== A4SpeechBridge.kt content ==="
          cat src-tauri/gen/android/app/src/main/java/app/tauri/A4SpeechBridge.kt | head -30

      - name: Keep Android native bridge for JNI
        run: |
          cat >> src-tauri/gen/android/app/proguard-rules.pro << 'EOF'

          # Rust calls this Kotlin bridge by exact JNI class/method names.
          -keep class app.tauri.A4SpeechBridge { *; }
          -keepclassmembers class app.tauri.A4SpeechBridge { *; }
          EOF
          echo "✓ A4SpeechBridge keep rules installed"

      - name: Replace Android icons
        run: |
          RES="src-tauri/gen/android/app/src/main/res"
          # Remove adaptive icon XML (forces use of plain PNG icons)
          rm -rf "$RES/mipmap-anydpi-v26"
          rm -f "$RES/values/ic_launcher_background.xml"
          # Copy plain icon to all densities
          for d in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$RES/$d"
            cp src-tauri/icons/icon.png "$RES/$d/ic_launcher.png"
          done
          echo "✓ Icons replaced"

      - name: Build Android APK
        id: build-apk
        run: |
          echo "=== npx tauri check ==="
          which npx && npx --version
          npx tauri --version 2>&1 || echo "tauri CLI not found via npx"
          echo "=== node_modules/.bin/tauri ==="
          ls -la node_modules/.bin/tauri 2>/dev/null || echo "not found"
          echo "=== Env: CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER ==="
          echo "$CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER"
          echo "=== NDK clang check ==="
          NDK_VER=$(ls $ANDROID_HOME/ndk | head -1)
          find "$ANDROID_HOME/ndk/$NDK_VER/toolchains/llvm/prebuilt" -name "aarch64-linux-android*clang*" -type f 2>/dev/null | head -5
          echo "=== Rust target check ==="
          rustup target list --installed | grep aarch64
          echo "=== Build start ==="
          set -x
          # Run with --info to capture Kotlin compilation errors (they appear at the START of the build log)
          # Use script to capture exit code: PIPESTATUS[0] is npx, PIPESTATUS[1] is the inner tee
          npx tauri android build --apk --target aarch64 2>&1 | tee /tmp/gradle-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set +x
          echo "BUILD_EXIT_CODE=$BUILD_EXIT" >> "$GITHUB_OUTPUT"
          echo "=== First 100 lines of Gradle log (Kotlin errors appear here) ==="
          head -100 /tmp/gradle-build.log
          echo "=== Kotlin compile errors ==="
          grep -nE '(^e:|A4SpeechBridge|Unresolved reference|Type mismatch|Compilation error)' /tmp/gradle-build.log | head -200 || true
          echo "=== Last 20 lines of log ==="
          tail -20 /tmp/gradle-build.log
          echo "=== Verify APK exists ==="
          find src-tauri/gen/android/app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "NO APK FOUND in outputs/"
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::tauri android build exited with code $BUILD_EXIT"
            exit $BUILD_EXIT
          fi

      - name: Debug Android project structure
        if: always()
        run: |
          echo "=== gen/android/ top-level structure ==="
          ls -la src-tauri/gen/android/ 2>/dev/null || echo "(gen/android missing)"
          echo "=== gen/android/app/ structure ==="
          ls -la src-tauri/gen/android/app/ 2>/dev/null || echo "(gen/android/app missing)"
          echo "=== gen/android/app/build/ structure ==="
          ls -la src-tauri/gen/android/app/build/ 2>/dev/null || echo "(gen/android/app/build missing)"
          echo "=== Cargo target android dir ==="
          ls ~/.cargo/registry/src/ 2>/dev/null | head -5
          echo "=== android gen log ==="
          cat /tmp/android-init.log 2>/dev/null || echo "(no init log)"

      - name: Debug APK location
        if: always()
        run: |
          echo "=== All files in outputs dir ==="
          find src-tauri/gen/android/app/build/outputs -type f 2>/dev/null || echo "(outputs dir missing)"
          echo "=== All APK files in build dir ==="
          find src-tauri/gen/android/app/build -name "*.apk" -type f 2>/dev/null || echo "(no APK files found)"
          echo "=== Build dir tree (top 3 levels) ==="
          find src-tauri/gen/android/app/build -maxdepth 3 -type d 2>/dev/null | head -30 || echo "(build dir missing)"
          echo "=== Rust target dir ==="
          ls ~/.cargo/registry/cache/ 2>/dev/null || echo "(no cargo cache)"
          echo "=== Cargo env ==="
          env | grep -E "CARGO|NDK|ANDROID" || true

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log
          retention-days: 5

      - name: Upload Gradle problems report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-problems-report
          path: src-tauri/gen/android/build/reports/problems/
          retention-days: 5

      - name: Sign APK
        id: sign-apk
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # Use persistent keystore if available, otherwise generate a temporary one
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/release.jks
            KS=/tmp/release.jks
            echo "✓ Using persistent release keystore"
          else
            keytool -genkey -v \
              -keystore /tmp/debug.jks \
              -alias a4memory \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=A4 Memory, OU=Dev, O=k7tmiz, L=Unknown, ST=Unknown, C=US"
            KS=/tmp/debug.jks
            echo "⚠ No ANDROID_KEYSTORE_BASE64 secret — using temporary keystore (won't survive reinstall)"
          fi

          # Find APK: search whole outputs tree (arch-specific subdirs like aarch64/release/)
          UNSIGNED=$(find src-tauri/gen/android/app/build/outputs -type f -name "*.apk" | head -1)
          if [ -z "$UNSIGNED" ]; then
            echo "ERROR: No APK found in app/build/outputs"
            find src-tauri/gen/android/app/build/outputs -type f -name "*.apk" 2>/dev/null || echo "No APK files found"
            ls -la src-tauri/gen/android/app/build/outputs/ 2>/dev/null || echo "No outputs dir"
            exit 1
          fi
          echo "Found APK: $UNSIGNED"
          TAG="${{ github.event.release && github.event.release.tag_name || github.ref_name }}"
          SIGNED="a4-memory-${TAG#v}-android.apk"
          echo "Output APK: $SIGNED"
          pwd
          realpath "$SIGNED" || echo "realpath failed, using PWD/$SIGNED"
          ABS_SIGNED="${PWD}/${SIGNED}"
          echo "Signed APK absolute: $ABS_SIGNED"

          # Sign with apksigner (auto-detect version)
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner -type f | sort -r | head -1)
          $APKSIGNER sign \
            --ks "$KS" \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$SIGNED" "$UNSIGNED"

          echo "✓ APK signed: $SIGNED"
          echo "SIGNED_APK=$ABS_SIGNED" >> "$GITHUB_OUTPUT"

      - name: Upload APK to Release
        run: |
          # Read APK path from previous step output
          APK="${{ steps.sign-apk.outputs.SIGNED_APK }}"
          echo "APK path from step output: '$APK'"
          if [ -z "$APK" ]; then
            echo "ERROR: Signed APK path is empty (check if sign-apk step set SIGNED_APK output)"
            exit 1
          fi
          if [ ! -f "$APK" ]; then
            echo "ERROR: Signed APK not found at '$APK'"
            echo "PWD: $(pwd)"
            ls -la *.apk 2>/dev/null || echo "No APK in PWD"
            exit 1
          fi
          echo "Uploading APK: $APK ($(stat -c%s "$APK" 2>/dev/null || stat -f%z "$APK") bytes)"
          gh release upload ${{ github.ref_name }} "$APK" --clobber
          echo "✓ APK uploaded: $APK"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize-release:
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false
          echo "✓ Release published"
