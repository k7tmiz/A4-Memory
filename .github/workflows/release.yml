name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete existing release (draft or published) for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" &>/dev/null; then
            gh release delete "$TAG" --yes
            echo "✓ Deleted old release (draft or published) for $TAG"
          else
            echo "No existing release for $TAG"
          fi

  build-desktop:
    needs: cleanup
    name: build-desktop (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
            target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin --bundles app
          - platform: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tauri_args: ''
          - platform: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            tauri_args: ''

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'macOS' && matrix.target || '' }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: desktop-rust-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: desktop-rust-${{ matrix.target }}-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - name: Inject cloud.js from secret
        shell: bash
        env:
          CLOUD_JS_BASE64: ${{ secrets.CLOUD_JS_BASE64 }}
        run: |
          if [ -n "$CLOUD_JS_BASE64" ]; then
            node -e "require('fs').writeFileSync('js/cloud.js', Buffer.from(process.env.CLOUD_JS_BASE64, 'base64'))"
            echo "✓ cloud.js injected"
          else
            echo "! CLOUD_JS_BASE64 not set — using stub"
          fi

      - run: npm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'A4 Memory ${{ github.ref_name }}'
          releaseBody: |
            ## A4 Memory

            A4 纸随机排版背单词，打破列表式背书模式。

            ### 本次更新
            - 修复 Android 端 TTS 在部分设备上崩溃的问题
            - 修复 Android 端 TTS 在 release 构建中无法正常工作的问题
            - 新增前端 XSS 防护模块并同步到所有文档

            ### 功能
            - A4 随机排版、复习轮次、发音朗读、离线使用
            - 内置 CET4 / CET6 / 西班牙语词书，支持自定义导入
            - 云同步（登录后可在桌面端 / Android / Web 同步学习进度）
            - AI 词书生成
            - Android 端内置 eSpeak NG TTS 引擎（离线英/西等 100+ 语言），无 GMS 设备也能发音

            ### 下载
            | 平台 | 文件 |
            |------|------|
            | macOS (Apple Silicon) | `A4 Memory_*_aarch64.dmg` |
            | Windows (x64) | `A4 Memory_*_x64.exe` |
            | Linux | `A4 Memory_*_amd64.deb` / `.AppImage` |
            | Android | `a4-memory-v*-android.apk` |

            ### 安装
            - **macOS**: 打开 `.dmg` → 拖入 Applications → 终端运行 `xattr -cr /Applications/A4\ Memory.app` 移除隔离标记
            - **Windows**: 双击 `.exe` → 按向导安装
            - **Linux**: `sudo dpkg -i *.deb` 或直接运行 `.AppImage`
            - **Android**: 允许来源不明应用 → 点击 `.apk` 安装

            ### 说明
            - 此版本为 GitHub Actions 自动构建，**含云同步功能**
            - 网页版请访问 **[k7tmiz.com/words](https://k7tmiz.com/words)**
            - `cloud.js` 为私有模块，如需使用请联系作者
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri_args }}

      - name: Create macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          APP_PATH=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "No macOS .app bundle found"
            exit 1
          fi

          DMG_ROOT=$(mktemp -d)
          cp -R "$APP_PATH" "$DMG_ROOT/"
          ln -s /Applications "$DMG_ROOT/Applications"

          DMG_NAME="A4 Memory_${VERSION}_aarch64.dmg"
          hdiutil create \
            -volname "A4 Memory" \
            -srcfolder "$DMG_ROOT" \
            -ov \
            -format UDZO \
            "$DMG_NAME"

          gh release upload "${{ github.ref_name }}" "$DMG_NAME" --clobber
          echo "✓ DMG uploaded: $DMG_NAME"

  build-android:
    needs: build-desktop
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: android-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: android-rust-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle
            src-tauri/gen/android/.gradle
          key: android-gradle-${{ hashFiles('src-tauri/Cargo.lock', '.github/workflows/release.yml') }}
          restore-keys: android-gradle-

      - run: npm ci

      - name: Inject cloud.js from secret
        shell: bash
        env:
          CLOUD_JS_BASE64: ${{ secrets.CLOUD_JS_BASE64 }}
        run: |
          if [ -n "$CLOUD_JS_BASE64" ]; then
            node -e "require('fs').writeFileSync('js/cloud.js', Buffer.from(process.env.CLOUD_JS_BASE64, 'base64'))"
            echo "✓ cloud.js injected"
          else
            echo "! CLOUD_JS_BASE64 not set — using stub"
          fi

      - run: npm run build

      - name: Init Android project
        run: |
          rm -rf src-tauri/gen/android
          npx tauri android init

      - name: Install Android native bridge
        run: |
          mkdir -p src-tauri/gen/android/app/src/main/java/app/tauri
          cp src-tauri/android/A4SpeechBridge.kt src-tauri/gen/android/app/src/main/java/app/tauri/A4SpeechBridge.kt
          echo "✓ Android native bridge installed"

      - name: Install Android raw resources (espeak TTS APK)
        run: |
          mkdir -p src-tauri/gen/android/app/src/main/res/raw
          cp src-tauri/android/res/raw/espeak.apk src-tauri/gen/android/app/src/main/res/raw/espeak.apk
          echo "✓ espeak TTS APK installed"

      - name: Merge AndroidManifest permissions
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          # Add eSpeak NG TTS required permissions to the generated manifest
          # Use Python for reliable XML manipulation without external tools
          python3 -c "
          import xml.etree.ElementTree as ET

          ns = 'http://schemas.android.com/apk/res/android'
          tree = ET.parse('$MANIFEST')
          root = tree.getroot()

          # Permissions to add
          perms = [
              ('android.permission.REQUEST_DELETE_PACKAGES', 'android', ns),
              ('android.permission.REQUEST_INSTALL_PACKAGES', 'android', ns),
              ('android.permission.INSTALL_TTS_ENGINE', 'android', ns),
          ]
          existing = {p.get(f'{{{ns}}}name') for p in root.findall(f'{{{ns}}}uses-permission') if p.get(f'{{{ns}}}name')}

          for name, _prefix, _ns_uri in perms:
              if name not in existing:
                  elem = ET.SubElement(root, f'{{{ns}}}uses-permission')
                  elem.set(f'{{{ns}}}name', name)

          tree.write('$MANIFEST', encoding='utf-8', xml_declaration=True)
          print('✓ AndroidManifest permissions merged')
          "

      - name: Replace Android icons
        run: |
          RES="src-tauri/gen/android/app/src/main/res"
          # Remove adaptive icon XML (forces use of plain PNG icons)
          rm -rf "$RES/mipmap-anydpi-v26"
          rm -f "$RES/values/ic_launcher_background.xml"
          # Copy plain icon to all densities
          for d in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$RES/$d"
            cp src-tauri/icons/icon.png "$RES/$d/ic_launcher.png"
          done
          echo "✓ Icons replaced"

      - name: Build Android APK
        run: npx tauri android build --apk

      - name: Sign APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # Use persistent keystore if available, otherwise generate a temporary one
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/release.jks
            KS=/tmp/release.jks
            echo "✓ Using persistent release keystore"
          else
            keytool -genkey -v \
              -keystore /tmp/debug.jks \
              -alias a4memory \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=A4 Memory, OU=Dev, O=k7tmiz, L=Unknown, ST=Unknown, C=US"
            KS=/tmp/debug.jks
            echo "⚠ No ANDROID_KEYSTORE_BASE64 secret — using temporary keystore (won't survive reinstall)"
          fi

          # Find APK
          UNSIGNED=$(find src-tauri/gen/android -name "*debug*.apk" 2>/dev/null | head -1)
          if [ -z "$UNSIGNED" ]; then
            UNSIGNED=$(find src-tauri/gen/android -name "*.apk" 2>/dev/null | head -1)
          fi
          SIGNED="a4-memory-${{ github.ref_name }}-android.apk"

          # Sign with apksigner (auto-detect version)
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner -type f | sort -r | head -1)
          $APKSIGNER sign \
            --ks "$KS" \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$SIGNED" "$UNSIGNED"

          echo "✓ APK signed: $SIGNED"

      - name: Upload APK to Release
        run: |
          APK="a4-memory-${{ github.ref_name }}-android.apk"
          gh release upload ${{ github.ref_name }} "$APK" --clobber
          echo "✓ APK uploaded"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize-release:
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Append commit log and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            COMMITS_RAW=$(git log --no-merges --format="%s" "$PREV_TAG..HEAD")
          else
            COMMITS_RAW=$(git log --no-merges --format="%s" -20)
          fi

          gh release view "$TAG" --json body -q '.body' > /tmp/release-body.md

          export COMMITS_RAW
          node -e "
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/release-body.md', 'utf8');
            const translations = new Map([
              ['add espeak ng builtin tts engine for android offline support', '新增 Android 端内置 eSpeak NG TTS 引擎，支持离线发音（英/西等 100+ 语言）'],
              ['fix android tts crash: spawn jni call in detached async task', '修复 Android 端 TTS 在部分设备上崩溃的问题'],
              ['fix android tts release bridge', '修复 Android 端 TTS 在 release 构建中无法正常工作的问题'],
              ['docs: add js/core/sanitize.js and sync apiKey protection across all docs', '新增前端 XSS 防护模块并同步到所有文档'],
              ['fix pdf export preview rendering', '修复 PDF 导出预览与实际打印内容不一致的问题'],
              ['fix pdf preview scale ratio', '修复 PDF 导出预览比例显示不一致的问题'],
              ['fix android update apk download asset', '修复 Android 端检查更新下载成 .bin 或错误文件的问题'],
              ['add android native text to speech', '新增 Android 端系统文字转语音朗读支持'],
              ['shorten desktop release job names', '简化桌面端 Release 构建任务名称'],
              ['fix macos release dmg packaging', '修复 macOS Release DMG 打包失败的问题'],
              ['fix tauri pdf export and update downloads', '修复桌面端/Android 端 PDF 导出和更新下载跳转问题']
            ]);
            const lines = (process.env.COMMITS_RAW || '')
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter(Boolean)
              .filter((line) => !/^(chore|ci|build):/i.test(line))
              .map((line) => line.replace(/^(feat|fix|docs|refactor|style|test|perf|revert):\s*/i, '').trim())
              .map((line) => translations.get(line) || (/[\u4e00-\u9fff]/.test(line) ? line : '优化内部实现与发布流程'));
            const commits = [...new Set(lines)].map((line) => '- ' + line).join('\n') || '- 修复若干问题，优化用户体验';
            const updated = body.replace(
              /### 本次更新[\s\S]*?(?=### )/,
              '### 本次更新\n' + commits + '\n\n'
            );
            fs.writeFileSync('/tmp/release-body.md', updated);
          "

          gh release edit "$TAG" --notes-file /tmp/release-body.md --draft=false
          echo "✓ Release published"
