name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  rust-check:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Configure Android NDK linker
        run: |
          NDK_VER=$(ls "$ANDROID_HOME/ndk" 2>/dev/null | head -1)
          if [ -z "$NDK_VER" ]; then
            "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;default"
            NDK_VER=$(ls "$ANDROID_HOME/ndk" | head -1)
          fi
          NDK_TOOLCHAIN="$ANDROID_HOME/ndk/$NDK_VER/toolchains/llvm/prebuilt"
          NDK_CLANG=$(find "$NDK_TOOLCHAIN" -name "aarch64-linux-android21-clang*" -type f | grep -v ++ | head -1)
          NDK_AR=$(find "$NDK_TOOLCHAIN" -name "llvm-ar" -type f | head -1)
          if [ -z "$NDK_CLANG" ]; then
            echo "::error::aarch64-linux-android21-clang not found"
            exit 1
          fi
          if [ -z "$NDK_AR" ]; then
            echo "::error::NDK llvm-ar not found"
            exit 1
          fi
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_CLANG}" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=${NDK_CLANG}" >> "$GITHUB_ENV"
          echo "CXX_aarch64_linux_android=${NDK_CLANG}++" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=${NDK_AR}" >> "$GITHUB_ENV"
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libgtk-3-dev libssl-dev
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ci-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ci-rust-
      - name: cargo check
        working-directory: src-tauri
        run: cargo check
      - name: cargo check (Android)
        working-directory: src-tauri
        run: cargo check --target aarch64-linux-android
