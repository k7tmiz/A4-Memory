name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - name: Inject cloud.js from secret
        shell: bash
        env:
          CLOUD_JS_BASE64: ${{ secrets.CLOUD_JS_BASE64 }}
        run: |
          if [ -n "$CLOUD_JS_BASE64" ]; then
            node -e "require('fs').writeFileSync('js/cloud.js', Buffer.from(process.env.CLOUD_JS_BASE64, 'base64'))"
            echo "✓ cloud.js injected"
          else
            echo "! CLOUD_JS_BASE64 not set — using stub"
          fi

      - run: npm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'A4 Word Memory ${{ github.ref_name }}'
          releaseBody: |
            ## A4 Word Memory

            A4 纸随机排版背单词，打破列表式背书模式。

            ### 功能
            - A4 随机排版、复习轮次、发音朗读、离线使用
            - 内置 CET4 / CET6 / 西班牙语词书，支持自定义导入
            - 云同步（登录后可在桌面端 / Android / Web 同步学习进度）
            - AI 词书生成
            - Android 端发音需安装 Google 文字转语音引擎

            ### 下载
            | 平台 | 文件 |
            |------|------|
            | macOS (Apple Silicon) | `A4 Word Memory_*_aarch64.dmg` |
            | Windows (x64) | `A4 Word Memory_*_x64.exe` |
            | Linux | `A4 Word Memory_*_amd64.deb` / `.AppImage` |
            | Android | `A4 Word Memory_*_android.apk` |

            ### 安装
            - **macOS**: 打开 `.dmg` → 拖入 Applications → 终端运行 `xattr -cr /Applications/A4\ Word\ Memory.app` 移除隔离标记
            - **Windows**: 双击 `.exe` → 按向导安装
            - **Linux**: `sudo dpkg -i *.deb` 或直接运行 `.AppImage`
            - **Android**: 允许来源不明应用 → 点击 `.apk` 安装

            ### 说明
            - 此版本为 GitHub Actions 自动构建，**含云同步功能**
            - 网页版请访问 **[k7tmiz.com/words](https://k7tmiz.com/words)**
            - `cloud.js` 为私有模块，如需使用请联系作者
          releaseDraft: true
          prerelease: false

  build-android:
    needs: build-desktop
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - run: npm ci

      - name: Inject cloud.js from secret
        shell: bash
        env:
          CLOUD_JS_BASE64: ${{ secrets.CLOUD_JS_BASE64 }}
        run: |
          if [ -n "$CLOUD_JS_BASE64" ]; then
            node -e "require('fs').writeFileSync('js/cloud.js', Buffer.from(process.env.CLOUD_JS_BASE64, 'base64'))"
            echo "✓ cloud.js injected"
          else
            echo "! CLOUD_JS_BASE64 not set — using stub"
          fi

      - run: npm run build

      - name: Init Android project
        run: npx tauri android init

      - name: Replace Android icons
        run: |
          RES="src-tauri/gen/android/app/src/main/res"
          cp src-tauri/icons/icon.png "$RES/mipmap-hdpi/ic_launcher.png"
          cp src-tauri/icons/icon.png "$RES/mipmap-mdpi/ic_launcher.png"
          cp src-tauri/icons/icon.png "$RES/mipmap-xhdpi/ic_launcher.png"
          cp src-tauri/icons/icon.png "$RES/mipmap-xxhdpi/ic_launcher.png"
          cp src-tauri/icons/icon.png "$RES/mipmap-xxxhdpi/ic_launcher.png"
          echo "✓ Icons replaced"

      - name: Build Android APK
        run: npx tauri android build --apk

      - name: Sign APK
        run: |
          # Generate a debug keystore
          keytool -genkey -v \
            -keystore /tmp/release.jks \
            -alias a4memory \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=A4 Memory, OU=Dev, O=k7tmiz, L=Unknown, ST=Unknown, C=US"

          # Find unsigned APK
          UNSIGNED=$(find src-tauri/gen/android -name "*.apk" 2>/dev/null | head -1)
          SIGNED="A4 Word Memory_${{ github.ref_name }}_android.apk"

          # Sign with apksigner (auto-detect version)
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner -type f | sort -r | head -1)
          $APKSIGNER sign \
            --ks /tmp/release.jks \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$SIGNED" "$UNSIGNED"

          echo "✓ APK signed: $SIGNED"

      - name: Upload APK to Release
        run: |
          APK="A4 Word Memory_${{ github.ref_name }}_android.apk"
          gh release upload ${{ github.ref_name }} "$APK" --clobber
          echo "✓ APK uploaded"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
